<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fasal Junction</title>

  <link rel="stylesheet" href="Style.css">

  <style>
    .language-buttons{
      margin-top:10px;
    }

    .language-buttons button{
      padding:8px 15px;
      margin:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <nav>
    <h1 id="title">🌾 Fasal Junction</h1>

    <div>
      <a href="../farmer login/farmer-login.html">
        <button id="farmerBtn">Farmer Login</button>
      </a>

      <a href="../customer login/customer-login.html">
        <button id="customerBtn">Customer Login</button>
      </a>
    </div>
  </nav>

  <!-- Language Buttons -->
  <div class="language-buttons" align="center">
    <button onclick="setEnglish()">English</button>
    <button onclick="setHindi()">हिन्दी</button>
  </div>

  <section class="hero">

    <h2 id="heroTitle">Fresh From Farm To Home</h2>

    <p id="heroText">
      Buy fresh products directly from farmers.
    </p>

    <input type="text" id="searchBox" placeholder="Search Products">

    <button id="searchBtn">Search</button>

  </section>

  <section class="products">

    <div class="card">

      <img src="https://via.placeholder.com/250" alt="product">

      <h3 id="productName">Fresh Tomatoes</h3>

      <p id="price">₹40/kg</p>

      <button onclick="addToCart()" id="cartBtn">
        Add To Cart
      </button>

    </div>

  </section>

  <script>

    function setEnglish(){

      document.getElementById("title").innerHTML =
      "🌾 Fasal Junction";

      document.getElementById("farmerBtn").innerHTML =
      "Farmer Login";

      document.getElementById("customerBtn").innerHTML =
      "Customer Login";

      document.getElementById("heroTitle").innerHTML =
      "Fresh From Farm To Home";

      document.getElementById("heroText").innerHTML =
      "Buy fresh products directly from farmers.";

      document.getElementById("searchBox").placeholder =
      "Search Products";

      document.getElementById("searchBtn").innerHTML =
      "Search";

      document.getElementById("productName").innerHTML =
      "Fresh Tomatoes";

      document.getElementById("price").innerHTML =
      "₹40/kg";

      document.getElementById("cartBtn").innerHTML =
      "Add To Cart";
    }

    function setHindi(){

      document.getElementById("title").innerHTML =
      "🌾 फसल जंक्शन";

      document.getElementById("farmerBtn").innerHTML =
      "किसान लॉगिन";

      document.getElementById("customerBtn").innerHTML =
      "ग्राहक लॉगिन";

      document.getElementById("heroTitle").innerHTML =
      "खेत से सीधे आपके घर तक";

      document.getElementById("heroText").innerHTML =
      "किसानों से सीधे ताज़े उत्पाद खरीदें।";

      document.getElementById("searchBox").placeholder =
      "उत्पाद खोजें";

      document.getElementById("searchBtn").innerHTML =
      "खोजें";

      document.getElementById("productName").innerHTML =
      "ताज़े टमाटर";

      document.getElementById("price").innerHTML =
      "₹40/किलो";

      document.getElementById("cartBtn").innerHTML =
      "कार्ट में जोड़ें";
    }

    function addToCart(){
      alert("Product Added To Cart!");
    }

  </script>

</body>
</html>
